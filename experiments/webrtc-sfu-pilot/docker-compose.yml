# Linux 建议：host 网络便于 mediasoup UDP；浏览器访问 http://<服务器IP>:3000
#
# Redroid（androidboot.use_memfd / redroid_width 等）在仓库根目录 docker-compose.yml，
# 勿写在本文件；本文件仅定义 mediasoup 试点服务。
#
# 用法（本目录）:
#   MEDIASOUP_ANNOUNCED_IP=192.168.1.10 docker compose up --build
#
# MEDIASOUP_ANNOUNCED_IP 填「浏览器能访问到的」本机 IP（公网或局域网），勿留默认 127.0.0.1 给远程看。

services:
  webrtc-sfu-pilot:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm}
    network_mode: host
    environment:
      PILOT_VERSION: ${PILOT_VERSION:-pilot-20260207c}
      PORT: ${PORT:-3000}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-49999}
      # Layer C1 PoC：FFmpeg → PlainTransport。宿主机推荐 scripts/run-c1-ffmpeg-ingest.sh（从 compose 日志解析 host/port）
      # 浏览器有 RTP 但 framesDecoded=0 / 黑屏时，改为 vp8：MEDIASOUP_INGEST_CODEC=vp8（需重建镜像）
      MEDIASOUP_INGEST_TEST: ${MEDIASOUP_INGEST_TEST:-0}
      MEDIASOUP_INGEST_CODEC: ${MEDIASOUP_INGEST_CODEC:-h264}
