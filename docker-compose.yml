# 默认：Redroid（适用于大多数无嵌套 KVM 的 ECS / 云主机）
# 有 KVM 的可选方案见 docker-compose.emulator.yml
# 官方文档: https://github.com/remote-android/redroid-doc

services:
  redroid:
    # 默认 Android 9（API 28），降低部分 App 在 x86_64 容器上的兼容风险；可覆盖 REDROID_IMAGE
    image: ${REDROID_IMAGE:-redroid/redroid:9.0.0-latest}
    container_name: cloudphone-redroid
    restart: unless-stopped
    privileged: true
    # 宿主需已 modprobe binder_linux；否则容器内 gatekeeperd 等会报 /dev/binder No such file
    devices:
      - /dev/binder
      - /dev/hwbinder
      - /dev/vndbinder
    # 不对外绑定公网，仅本机，配合 SSH 端口转发访问；若必须公网请改但务必限制来源 IP
    ports:
      - "127.0.0.1:${REDROID_HOST_PORT:-5555}:5555"
    # 5.15+ 内核云机常见启动失败/反复重启，见 redroid-doc；不需要时可从 command 中删掉下一行
    command:
      - "androidboot.use_memfd=0"
      - "androidboot.redroid_width=720"
      - "androidboot.redroid_height=1280"
      - "androidboot.redroid_dpi=320"
    networks:
      - cloudphone

networks:
  cloudphone:
    driver: bridge
